<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>今日の発信テーマ</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #d4a843;
      --gold-light: #f0d080;
      --coral: #e8806a;
      --sage: #7aab8a;
      --indigo: #6b7fd4;
      --rose: #e07090;
      --cream: #fefcf9;
      --warm-white: #ffffff;
      --ink: #2d2820;
      --mid-ink: #6b5d52;
      --light-ink: #a89888;
    }

    body {
      font-family: 'Hiragino Mincho ProN', 'Hiragino Kaku Gothic ProN', serif;
      background: var(--cream);
      color: var(--ink);
      min-height: 100vh;
      overflow-x: hidden;
    }

    canvas#sparkle {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      opacity: 1;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 20%, rgba(212,168,67,0.08) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 80%, rgba(232,128,106,0.08) 0%, transparent 60%),
        radial-gradient(ellipse at 60% 10%, rgba(107,127,212,0.06) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    nav {
      display: flex;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(212,168,67,0.2);
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 20px rgba(212,168,67,0.1);
    }
    nav button {
      flex: 1;
      padding: 15px 8px;
      border: none;
      background: transparent;
      font-size: 13px;
      color: var(--light-ink);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.25s;
      font-family: inherit;
    }
    nav button.active {
      color: var(--gold);
      border-bottom-color: var(--gold);
      font-weight: 700;
    }

    .page { display: none; padding: 24px 20px 80px; max-width: 480px; margin: 0 auto; position: relative; z-index: 1; }
    .page.active { display: block; }

    .today-header {
      text-align: center;
      padding: 24px 0 20px;
    }
    .today-date {
      font-size: 11px;
      color: var(--light-ink);
      letter-spacing: 0.2em;
      margin-bottom: 4px;
    }
    .deco-line {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 12px 0;
    }
    .deco-line::before, .deco-line::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(212,168,67,0.4), transparent);
    }
    .deco-line span { font-size: 14px; color: var(--gold); }
    .today-eyebrow {
      font-size: 10px;
      color: var(--gold);
      font-weight: 700;
      letter-spacing: 0.3em;
    }

    @property --border-angle {
      syntax: '<angle>';
      initial-value: 0deg;
      inherits: false;
    }
    @keyframes borderSpin { to { --border-angle: 360deg; } }

    .theme-card {
      position: relative;
      border-radius: 22px;
      margin-bottom: 14px;
      background: var(--warm-white);
      padding: 28px 24px 24px;
      box-shadow: 0 4px 24px rgba(212,168,67,0.15);
    }
    .theme-card::before {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 24px;
      background: conic-gradient(
        from var(--border-angle),
        #a07820 0%, #c8a030 15%, #f0d060 28%,
        #fff8e0 38%, #ffffff 43%, #fff8e0 48%,
        #f0d060 58%, #c8a030 72%, #a07820 85%,
        #c8a030 92%, #a07820 100%
      );
      animation: borderSpin 4s linear infinite;
      z-index: -1;
    }

    .theme-card-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .theme-icon { font-size: 32px; line-height: 1; }
    .btn-refresh {
      background: rgba(212,168,67,0.08);
      border: 1px solid rgba(212,168,67,0.22);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 11px;
      color: var(--gold);
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s;
    }
    .btn-refresh:hover { background: rgba(212,168,67,0.18); }

    .theme-keyword {
      font-size: 28px;
      font-weight: 800;
      color: var(--ink);
      line-height: 1.3;
      margin-bottom: 10px;
      font-family: 'Hiragino Mincho ProN', serif;
      letter-spacing: 0.03em;
    }
    .theme-sub {
      font-size: 13px;
      color: var(--mid-ink);
      line-height: 1.8;
      margin-bottom: 16px;
    }
    .theme-hint {
      font-size: 12px;
      color: var(--light-ink);
      line-height: 2;
      border-top: 1px solid rgba(212,168,67,0.18);
      padding-top: 14px;
    }

    .write-area {
      background: var(--warm-white);
      border: 1px solid rgba(212,168,67,0.2);
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 14px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.04);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .write-area:focus-within {
      border-color: rgba(212,168,67,0.5);
      box-shadow: 0 4px 20px rgba(212,168,67,0.1);
    }
    .write-area label {
      font-size: 11px;
      color: var(--light-ink);
      display: block;
      margin-bottom: 12px;
      letter-spacing: 0.05em;
    }
    textarea {
      width: 100%;
      border: none;
      outline: none;
      font-size: 15px;
      line-height: 2;
      color: var(--ink);
      resize: none;
      background: transparent;
      font-family: 'Hiragino Mincho ProN', serif;
      min-height: 180px;
    }
    textarea::placeholder { color: #d0c8c0; }
    .char-count {
      text-align: right;
      font-size: 11px;
      color: var(--light-ink);
      margin-top: 8px;
    }

    @keyframes btnShimmer {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .btn-done {
      width: 100%;
      padding: 17px;
      background: linear-gradient(270deg, #f0c060, #e87060, #c070d0, #6090e0, #50c090, #e0a040);
      background-size: 400% 400%;
      animation: btnShimmer 4s ease infinite;
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: 0.1em;
      box-shadow: 0 4px 24px rgba(212,168,67,0.25);
      transition: transform 0.1s;
      text-shadow: 0 1px 3px rgba(0,0,0,0.15);
    }
    .btn-done:active { transform: scale(0.97); }
    .btn-done.posted {
      background: linear-gradient(270deg, #50c090, #60b0d0, #7aab8a, #50c090);
      background-size: 300% 300%;
      animation: btnShimmer 3s ease infinite;
    }
    .btn-skip {
      width: 100%;
      padding: 13px;
      background: transparent;
      color: var(--light-ink);
      border: none;
      font-size: 12px;
      cursor: pointer;
      margin-top: 8px;
      font-family: inherit;
    }

    .section-title {
      font-size: 11px;
      font-weight: 700;
      color: var(--light-ink);
      letter-spacing: 0.2em;
      margin-bottom: 14px;
      margin-top: 6px;
    }

    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
    .stat-card {
      background: var(--warm-white);
      border: 1px solid rgba(212,168,67,0.2);
      border-radius: 16px;
      padding: 20px;
      text-align: center;
      box-shadow: 0 2px 16px rgba(0,0,0,0.04);
    }
    .stat-num { font-size: 36px; font-weight: 800; color: var(--gold); }
    .stat-label { font-size: 11px; color: var(--light-ink); margin-top: 4px; }

    .post-log-item {
      background: var(--warm-white);
      border: 1px solid rgba(212,168,67,0.12);
      border-radius: 14px;
      padding: 15px 16px;
      margin-bottom: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.03);
    }
    .post-log-date { font-size: 11px; color: var(--light-ink); margin-bottom: 5px; }
    .post-log-keyword { font-size: 15px; font-weight: 800; color: var(--gold); margin-bottom: 4px; }
    .post-log-text { font-size: 12px; color: var(--mid-ink); line-height: 1.7; }

    .empty-state { text-align: center; padding: 48px 20px; color: var(--light-ink); font-size: 14px; line-height: 2; }
  </style>
</head>
<body>

<canvas id="sparkle"></canvas>

<nav>
  <button class="active" onclick="showPage('today', this)">✦ 今日</button>
  <button onclick="showPage('log', this)">◈ 記録</button>
</nav>

<!-- 今日 -->
<div id="page-today" class="page active">
  <div class="today-header">
    <div class="today-date" id="today-date"></div>
    <div class="deco-line"><span>✦</span></div>

  </div>

  <div class="theme-card">
    <div class="theme-card-top">
      <span class="theme-icon" id="theme-icon">🌸</span>

    </div>
    <div class="theme-keyword" id="theme-keyword">読み込み中...</div>
    <div class="theme-sub" id="theme-sub"></div>
    <div class="theme-hint" id="theme-hint"></div>
  </div>

  <div class="write-area">
    <label>✧ 浮かんだまま、ここに（書けたら）</label>
    <textarea id="write-text" placeholder="きれいにまとめなくていい。&#10;あなたの中にあるものを、そのまま。" oninput="updateCharCount()"></textarea>
    <div class="char-count"><span id="char-count">0</span> 文字</div>
  </div>

  <button class="btn-done" id="btn-done" onclick="markPosted()">✓ 投稿した！</button>
  <button class="btn-skip" onclick="markSkip()">今日はパス　― それでいい ―</button>
</div>

<!-- 記録 -->
<div id="page-log" class="page">
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-num" id="stat-posted">0</div>
      <div class="stat-label">投稿した日</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="stat-streak">0</div>
      <div class="stat-label">連続日数</div>
    </div>
  </div>
  <div class="section-title">投稿の記録</div>
  <div id="post-log"><div class="empty-state">投稿した記録が<br>ここに積み重なっていきます</div></div>
</div>

// キラキラ
(function() {
  const canvas = document.getElementById('sparkle');
  const ctx = canvas.getContext('2d');
  let W, H, particles = [];
  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  resize(); window.addEventListener('resize', resize);
  const colors = ['#f0d080','#e8e0c8','#d4a843','#ffffff','#c8c0b0','#f8f0d8','#b8a878'];
  function cp() {
    return { x: Math.random()*W, y: Math.random()*H, r: Math.random()*3+1,
      alpha: Math.random()*0.6+0.3, color: colors[Math.floor(Math.random()*colors.length)],
      speed: Math.random()*0.4+0.15, drift: (Math.random()-0.5)*0.4,
      twinkle: Math.random()*Math.PI*2, twinkleSpeed: Math.random()*0.04+0.015 };
  }
  for (let i = 0; i < 40; i++) particles.push(cp());
  function draw() {
    ctx.clearRect(0,0,W,H);
    particles.forEach(p => {
      p.twinkle += p.twinkleSpeed;
      const a = p.alpha*(0.4+0.6*Math.sin(p.twinkle));
      ctx.save(); ctx.globalAlpha=a; ctx.fillStyle=p.color;
      ctx.shadowColor=p.color; ctx.shadowBlur=10;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill(); ctx.restore();
      p.y-=p.speed; p.x+=p.drift;
      if(p.y<-10) Object.assign(p,cp(),{y:H+10});
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

// データ
let postLog = [];
let todayStatus = {};
let saveTimer = null;

async function loadData() {
  const snap = await getDoc(docRef);
  if (snap.exists()) {
    const d = snap.data();
    postLog = d.postLog || [];
    todayStatus = d.todayStatus || {};
  }
  renderToday();
  onSnapshot(docRef, snap => {
    if (snap.exists()) {
      const d = snap.data();
      postLog = d.postLog || [];
      todayStatus = d.todayStatus || {};
      const active = document.querySelector('.page.active')?.id?.replace('page-','');
      if (active === 'today') renderToday();
      if (active === 'log') renderLog();
    }
  });
}

function saveData() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => setDoc(docRef, { postLog, todayStatus }), 500);
}

function pickTheme() {
  return KEYWORDS[Math.floor(Math.random() * KEYWORDS.length)];
}

function applyTheme(t) {
  document.getElementById('theme-icon').textContent = t.icon;
  document.getElementById('theme-keyword').textContent = t.keyword;
  document.getElementById('theme-sub').textContent = t.sub;
  document.getElementById('theme-hint').textContent = t.hint;
}

function renderToday() {
  const today = new Date();
  document.getElementById('today-date').textContent =
    today.toLocaleDateString('ja-JP', { year:'numeric', month:'long', day:'numeric', weekday:'long' });

  const dateKey = today.toISOString().split('T')[0];
  if (!todayStatus[dateKey]?.theme) {
    const theme = pickTheme();
    todayStatus[dateKey] = { ...(todayStatus[dateKey]||{}), theme };
    saveData();
  }
  applyTheme(todayStatus[dateKey].theme);

  if (todayStatus[dateKey]?.text) {
    document.getElementById('write-text').value = todayStatus[dateKey].text;
    updateCharCount();
  } else {
    document.getElementById('write-text').value = '';
    document.getElementById('char-count').textContent = '0';
  }

  const btn = document.getElementById('btn-done');
  if (todayStatus[dateKey]?.posted) {
    btn.textContent = '✓ 今日は投稿した！'; btn.classList.add('posted');
  } else {
    btn.textContent = '✓ 投稿した！'; btn.classList.remove('posted');
  }
}

function refreshTheme() {
  const dateKey = new Date().toISOString().split('T')[0];
  const theme = pickTheme();
  todayStatus[dateKey] = { ...(todayStatus[dateKey]||{}), theme };
  saveData();
  applyTheme(theme);
}

function updateCharCount() {
  const len = document.getElementById('write-text').value.length;
  document.getElementById('char-count').textContent = len;
  const dateKey = new Date().toISOString().split('T')[0];
  todayStatus[dateKey] = { ...(todayStatus[dateKey]||{}), text: document.getElementById('write-text').value };
  saveData();
}

function markPosted() {
  const dateKey = new Date().toISOString().split('T')[0];
  const text = document.getElementById('write-text').value;
  const theme = todayStatus[dateKey]?.theme;
  todayStatus[dateKey] = { ...(todayStatus[dateKey]||{}), posted: true, text: '' };
  postLog.push({ date: dateKey, keyword: theme?.keyword||'', icon: theme?.icon||'', text });
  saveData();

  document.getElementById('write-text').value = '';
  document.getElementById('char-count').textContent = '0';

  const newTheme = pickTheme();
  todayStatus[dateKey] = { ...(todayStatus[dateKey]||{}), theme: newTheme };
  saveData();
  applyTheme(newTheme);

  const btn = document.getElementById('btn-done');
  btn.textContent = '✓ 今日は投稿した！'; btn.classList.add('posted');
}

function markSkip() {
  const dateKey = new Date().toISOString().split('T')[0];
  todayStatus[dateKey] = { ...(todayStatus[dateKey]||{}), skipped: true };
  saveData();
  alert('それでいい。また明日 ☻');
}

function renderLog() {
  document.getElementById('stat-posted').textContent = postLog.length;
  let streak = 0;
  const today = new Date();
  for (let i = 0; i < 365; i++) {
    const d = new Date(today); d.setDate(d.getDate()-i);
    const key = d.toISOString().split('T')[0];
    if (todayStatus[key]?.posted) streak++;
    else if (i > 0) break;
  }
  document.getElementById('stat-streak').textContent = streak;
  const logEl = document.getElementById('post-log');
  if (!postLog.length) { logEl.innerHTML = '<div class="empty-state">投稿した記録が<br>ここに積み重なっていきます</div>'; return; }
  logEl.innerHTML = [...postLog].reverse().map(p => `
    <div class="post-log-item">
      <div class="post-log-date">${new Date(p.date+'T00:00:00').toLocaleDateString('ja-JP',{month:'long',day:'numeric'})}</div>
      <div class="post-log-keyword">${p.icon} ${p.keyword}</div>
      <div class="post-log-text">${p.text?p.text.slice(0,80)+(p.text.length>80?'…':''):'（メモなし）'}</div>
    </div>`).join('');
}

function showPage(id, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  if (btn) btn.classList.add('active');
  if (id === 'today') renderToday();
  if (id === 'log') renderLog();
}

window.showPage = showPage;
window.refreshTheme = refreshTheme;
window.updateCharCount = updateCharCount;
window.markPosted = markPosted;
window.markSkip = markSkip;

loadData();
